# =========================================================
# ~/.tmux.conf
# =========================================================

# ---- 基本設定 ----
set -g default-terminal "tmux-256color"
set -sg escape-time 100
set -g history-limit 50000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ---- コピーモード (vi風) ----
setw -g mode-keys vi
set -g set-clipboard on

# ---- 活動通知 ----
set -g monitor-activity on
set -g visual-activity off
set -g activity-action other

# ---- ペインボーダー ----
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour141"

# ---- ステータスバー (Catppuccin Mocha 風, 上部表示, アクセント1色) ----
set -g status-position top
set -g status-interval 5
set -g status-style "bg=colour235,fg=colour250"

set -g status-left-length 30
set -g status-left "#[bg=colour141,fg=colour235,bold] #S #[bg=colour235,fg=colour250] "

set -g window-status-separator ""
set -g window-status-format "#[bg=colour235,fg=colour245] #I:#W "
set -g window-status-current-format "#[bg=colour141,fg=colour235,bold] #I:#W "
set -g window-status-activity-style "fg=colour215,bg=colour235,bold"

set -g status-right-length 60
set -g status-right "#[fg=colour245]#(~/.tmux/scripts/status-info.sh) #[fg=colour238]| #[fg=colour250] %Y-%m-%d %H:%M:%S "

# ---- プレフィックスキー ----
set -g prefix C-s
unbind C-b
bind C-s send-prefix

# ---- キーバインド ----
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# =========================================================
# ログ設定
# =========================================================
# pane の出力ログ: pane_log/<session>_<window>_<pane>_<pane_id>.log

set-hook -g after-new-session 'run-shell "~/.tmux/scripts/pipe-log.sh #{session_name}:#{window_index}.#{pane_index} ~/tmux-logs/panes/#{session_name}_#{window_index}_#{pane_index}_#{pane_id}.log"'
set-hook -g after-new-window 'run-shell "~/.tmux/scripts/pipe-log.sh #{session_name}:#{window_index}.#{pane_index} ~/tmux-logs/panes/#{session_name}_#{window_index}_#{pane_index}_#{pane_id}.log"'
set-hook -g after-split-window 'run-shell "~/.tmux/scripts/pipe-log.sh #{session_name}:#{window_index}.#{pane_index} ~/tmux-logs/panes/#{session_name}_#{window_index}_#{pane_index}_#{pane_id}.log"'
